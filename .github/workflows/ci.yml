name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Run tests
        run: uv run --extra dev python -m pytest -q tests/test_opm_source_toolbox.py

      - name: Build distributions
        run: uv run --with build python -m build

      - name: Check distributions
        run: uv run --with twine python -m twine check dist/*